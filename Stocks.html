<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #07101f;
    --s1:      #0c1a2e;
    --s2:      #112240;
    --s3:      #162d50;
    --border:  #1b3054;
    --border2: #244070;
    --text:    #ccd8ee;
    --text2:   #8aa3c0;
    --muted:   #4a6380;
    --blue:    #4b9eff;
    --orange:  #ff7b45;
    --red:     #ff4d6a;
  }

  body { 
    font-family: 'Sarabun', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh;
    /* BG Pattern for aesthetics */
    background-image:
      linear-gradient(rgba(75,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(75,158,255,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  /* ──────────────────────────────────────
     MODAL STYLES
  ─────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; z-index: 800;
    background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  
  .modal {
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 22px; width: 100%; max-width: 440px;
    padding: 30px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  
  .modal h3 { 
    font-size: 18px; font-weight: 800; margin-bottom: 22px; 
    display: flex; align-items: center; gap: 8px; color: #fff;
  }

  .m-field { margin-bottom: 14px; }
  
  .m-label { 
    font-size: 12px; color: var(--muted); font-weight: 600; 
    display: block; margin-bottom: 6px; 
  }
  
  .m-input {
    width: 100%; background: var(--s1);
    border: 1px solid var(--border2); border-radius: 10px;
    padding: 12px 14px; color: var(--text);
    font-family: 'Sarabun', sans-serif; font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .m-input:focus { border-color: var(--blue); }
  .m-input::placeholder { color: var(--muted); }
  
  /* ทำให้ไอคอนปฏิทินในช่องวันที่เป็นสีขาว */
  .m-input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1) opacity(0.6);
    cursor: pointer;
  }

  /* Month Selector Grid */
  .month-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 6px;
  }
  .month-btn {
    padding: 10px 4px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--s1); color: var(--text2);
    font-size: 13px; font-weight: 600; font-family: 'Sarabun', sans-serif;
    cursor: pointer; transition: .15s;
  }
  .month-btn:hover { border-color: var(--border2); }
  .month-btn.act  { 
    background: rgba(75,158,255,.15); 
    border-color: rgba(75,158,255,.35); 
    color: var(--blue); 
  }

  /* Buttons */
  .m-row  { display: flex; gap: 12px; margin-top: 24px; }
  .btn-cancel {
    flex: 1; padding: 12px; border-radius: 11px;
    background: transparent; border: 1px solid var(--border2);
    color: var(--text2); font-size: 14px; font-weight: 700;
    font-family: 'Sarabun', sans-serif; cursor: pointer; transition: .15s;
  }
  .btn-cancel:hover { background: var(--s1); color: #fff; }
  
  .btn-confirm {
    flex: 2; padding: 12px; border-radius: 11px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    border: none; color: #fff; font-size: 15px; font-weight: 700;
    font-family: 'Sarabun', sans-serif; cursor: pointer; transition: .15s;
    box-shadow: 0 4px 15px rgba(255, 77, 106, 0.3);
  }
  .btn-confirm:hover { opacity: .9; transform: translateY(-1px); }
</style>
</head>
<body>

<div class="overlay" id="modal-withdraw">
  <div class="modal">
    <h3>📤 บันทึกการเบิกออก</h3>

    <div class="m-field">
      <label class="m-label">ชื่อผู้เบิก</label>
      <input class="m-input" id="w-by" placeholder="T">
    </div>

    <div class="m-field">
      <label class="m-label">วันที่เบิกจริง</label>
      <input class="m-input" id="w-date" type="date">
    </div>

    <div class="m-field">
      <label class="m-label">เดือนที่ลงบันทึก</label>
      <div class="month-grid" id="month-grid">
        </div>
    </div>

    <div class="m-field">
      <label class="m-label">รหัสอะไหล่</label>
      <input class="m-input" id="w-id" placeholder="พิมพ์รหัสหรือชื่อ...">
    </div>

    <div class="m-field">
      <label class="m-label">จำนวนที่เบิก</label>
      <input class="m-input" id="w-qty" type="number" min="1" placeholder="0">
    </div>

    <div class="m-field">
      <label class="m-label">สาเหตุ / เหตุผล</label>
      <input class="m-input" id="w-reason" placeholder="เช่น ซ่อม Motor, PM ประจำเดือน...">
    </div>

    <div class="m-row">
      <button class="btn-cancel" onclick="alert('ปิดหน้าต่าง')">ยกเลิก</button>
      <button class="btn-confirm" onclick="alert('ยืนยันการเบิก!')">✅ ยืนยันเบิก</button>
    </div>
  </div>
</div>

<script>
  // 1. สร้างปุ่มเดือน
  const MONTH_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  let selectedMonth = new Date().getMonth(); // ค่า Default คือเดือนปัจจุบัน
  
  function buildMonthGrid() {
    const grid = document.getElementById('month-grid');
    grid.innerHTML = MONTH_SHORT.map((m, i) =>
      `<button class="month-btn ${i === selectedMonth ? ' act' : ''}" onclick="selectMonth(${i})">${m}</button>`
    ).join('');
  }

  // 2. ฟังก์ชันเมื่อกดเลือกเดือน
  function selectMonth(m) {
    selectedMonth = m;
    document.querySelectorAll('.month-btn').forEach((btn, i) => {
      btn.className = 'month-btn' + (i === m ? ' act' : '');
    });
  }

  // 3. เซ็ตค่า Default เมื่อโหลดหน้าเว็บ
  window.onload = function() {
    buildMonthGrid();
    // เซ็ตวันที่เป็นวันนี้
    document.getElementById('w-date').value = new Date().toISOString().split('T')[0];
  };
</script>

</body>
</html>
